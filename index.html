<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Retail Analysis Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="sidebar">
    <h2>Retail Analysis</h2>

    <label>Latitude</label>
    <input id="latInput" type="number" step="0.000001" value="42.5190" />

    <label>Longitude</label>
    <input id="lonInput" type="number" step="0.000001" value="-71.0325" />

    <button id="runBtn">Run Analysis</button>

    <div id="summary">
      <p>Enter a center coordinate and generate a 1km × 1km retail analysis area.</p>
    </div>

    <h3>Legend</h3>
    <div class="legend-item"><span class="box retail"></span> Retail / Commercial</div>
    <div class="legend-item"><span class="box residential"></span> Residential</div>
    <div class="legend-item"><span class="box hotel"></span> Hotel</div>
    <div class="legend-item"><span class="box unknown"></span> Unknown</div>

    <hr />

    <div class="legend-item"><span class="dot food"></span> Food & Beverage</div>
    <div class="legend-item"><span class="dot grocery"></span> Grocery</div>
    <div class="legend-item"><span class="dot fashion"></span> Fashion</div>
    <div class="legend-item"><span class="dot home"></span> Home / Furniture</div>
    <div class="legend-item"><span class="dot service"></span> Service / Health</div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
